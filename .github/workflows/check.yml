name: Check formatting, lint rules, and types

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "test"
  cancel-in-progress: true

env:
  BUILD_PATH: "."

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        # checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Get Node.js version
        id: get-node-version
        run: |
          if [ -f "${{ env.BUILD_PATH }}/.node-version" ]; then
            echo NODE_VERSION=`cat "${{ env.BUILD_PATH }}/.node-version"` >> $GITHUB_ENV
          else
            echo Missing file: "${{ env.BUILD_PATH }}/.node-version"
            exit 1
          fi

      - name: Setup pnpm
        # install pnpm v5.0.0
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        # setup-node v6.2.0
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ${{ env.BUILD_PATH }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: ${{ env.BUILD_PATH }}

      - name: Type check
        run: pnpm check
        working-directory: ${{ env.BUILD_PATH }}

      - name: Linting
        run: pnpm lint
        working-directory: ${{ env.BUILD_PATH }}

      - name: Format check
        run: pnpm fmt:check
        working-directory: ${{ env.BUILD_PATH }}

      # - name: Unit tests
      #   run: pnpm test
      #   working-directory: ${{ env.BUILD_PATH }}
